# Minimal configuration required to run Tiller.
# Uncomment and adapt one tracker section, choose an agent, and define at least one project.

# --- Minimum required -------------------------------------------------------
tracker:
  # ClickUp minimum:
  type: clickup
  token: YOUR_CLICKUP_TOKEN
  team_id: "YOUR_CLICKUP_TEAM_ID"
  trigger_status: DEVELOP

  # Telegram minimum:
  # type: telegram
  # bot_token: YOUR_TELEGRAM_BOT_TOKEN
  # state_path: ~/.tiller/telegram-state.json
  # trigger_status: new

agent:
  default: codex

projects:
  backend:
    url: https://github.com/your-org/backend

session:
  base_path: ~/.tiller/sessions

# --- Optional settings ------------------------------------------------------
# Everything below is optional. Uncomment what you need.

